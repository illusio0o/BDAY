<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 20th Birthday, Sophia!</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Page 1: Landing -->
    <div id="page1" class="page">
        <h1>Happy 20th Birthday, Sophia! ✨</h1>
        <p>Welcome to your special day.</p>
        <button onclick="showPage('page2')">Click to Open</button>
    </div>

    <!-- Page 2: Video -->
    <div id="page2" class="page" style="display:none;">
        <h2>The Video</h2>
        <video controls width="300">
            <source src="assets/soya.mp4" type="video/mp4">
        </video>
        <br>
        <button onclick="showPage('page3')">Next</button>
    </div>

    <!-- Page 3: Music -->
    <div id="page3" class="page" style="display:none;">
        <h2>The Song</h2>
        <audio controls>
            <source src="assets/SUP.mp3" type="audio/mpeg">
        </audio>
        <br>
        <button onclick="showPage('page4')">Next</button>
    </div>
<!-- Page 3.5: Birthday Cake Interaction -->
<div id="page3-5" class="page" style="display:none;">
    <h2>Make a Wish! 🎂</h2>
    
    <!-- This image changes when clicked -->
    <img id="cakeImage" src="assets/cake-lit.png" alt="Birthday Cake" style="width:100%; max-width:300px; cursor:pointer;" onclick="blowCandles()">
    
    <p id="wish-text">Tap the cake to blow it out!</p>
    <button onclick="showPage('page4')">Next</button>
</div>
    <!-- Page 4: Message -->
    <div id="page4" class="page" style="display:none;">
        <h2>To my dearest Sophia,</h2>
        <p>Happy 20th birthday! Wishing you the most amazing year ahead as you enter this new decade. You deserve all the happiness in the world.</p>
        <!-- Confetti Trigger -->
        <button onclick="triggerConfetti()">Celebrate!</button>
    </div>

    <!-- Link to your JavaScript logic -->
    <script src="script.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>
</html>
